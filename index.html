<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Démo Boutique - Artisanat du Bois</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f5f0ea; 
            color: #3e2723; 
            margin: 0; 
            padding: 40px 20px; 
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .card { 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 20px rgba(62, 39, 35, 0.05); 
            border: 1px solid #e0d4c8;
        }
        h1 { color: #5d4037; margin-bottom: 5px; font-size: 24px; }
        .subtitle { color: #8d6e63; font-style: italic; margin-bottom: 25px; }
        .product-title { font-size: 20px; font-weight: bold; margin-top: 15px; }
        .price { 
            font-size: 22px; 
            color: #2e7d32; 
            font-weight: bold; 
            margin: 15px 0 25px 0; 
        }
        .btn { 
            background: #635bff; 
            color: white; 
            padding: 14px 28px; 
            text-decoration: none; 
            border-radius: 6px; 
            font-weight: bold; 
            display: inline-block; 
            transition: background 0.2s;
            box-shadow: 0 4px 6px rgba(99, 91, 255, 0.15);
        }
        .btn:hover { background: #4b43d3; }
        .notice { font-size: 12px; color: #9e9e9e; margin-top: 25px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Atelier Chantournage</h1>
            <div class="subtitle">Boutique de démonstration</div>
            
            <hr style="border: 0; border-top: 1px solid #e0d4c8; margin-bottom: 20px;">
            
            <div class="product-title">🐾 Chien en bois chantourné</div>
            <p>Création artisanale unique réalisée entièrement à la main.</p>
            
            <div class="price">45,00 €</div>
            
            <a href="https://buy.stripe.com/test_8x2cN5aOw8pb1xdeNNdnW00" class="btn" target="_blank">Acheter cette création</a>
            
            <p class="notice">🔒 Paiement sécurisé par Stripe (Mode Test actif)</p>
        </div>
    </div>
</body>
</html>
